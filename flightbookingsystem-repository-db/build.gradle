plugins {
    id 'java'
    id 'application'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

application {
    mainClass = 'flightbookingsystem.Main'
}

dependencies {
    implementation project(':flightbookingsystem-model')
    implementation project(':flightbookingsystem-repository')

    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

tasks.named('run') {
    workingDir = rootProject.projectDir
}
